<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieApp Esercizio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/detail.js" type="module"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white min-h-screen font-sans antialiased flex flex-col justify-between">

    <header class="flex flex-col sm:flex-row justify-between items-center bg-gray-800 p-4 gap-4 z-50 relative">
        <div class="flex items-center space-x-4">
            <img src="img/logo-m.png" alt="Logo" class="h-6 sm:h-8 md:h-10 lg:h-12">
            <h1 class="text-xl md:text-2xl font-bold">MovieApp</h1>
        </div>
        <div class="flex items-center space-x-4 text-sm md:text-base">
            <a href="index.html" class="text-gray-400 hover:text-white">Home</a>
            <a href="movies.html" class="text-gray-400 hover:text-white">Movies</a>
            <a href="series.html" class="text-gray-400 hover:text-white">Serie</a>
            <a href="profile.html" class="text-gray-400 hover:text-white">Profilo</a>
        </div>
    </header>

    <main class="flex-grow w-full relative">
        
        <div id="loadingSpinner" class="flex justify-center items-center py-24 min-h-[50vh]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"></div>
        </div>

        <div id="errorMessage" class="hidden text-center py-24 px-4 min-h-[50vh] flex flex-col justify-center items-center space-y-4">
            <div class="text-5xl">⚠️</div>
            <p class="text-red-500 font-semibold text-lg">Impossibile caricare i dettagli di questo titolo.</p>
            <button onclick="window.history.back()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 text-white font-semibold rounded-lg text-sm border border-zinc-700 transition-all uppercase">
                Torna Indietro
            </button>
        </div>

        <div id="detailContainer" class="hidden w-full">
            
            <div id="detailBackdrop" class="detail-backdrop">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            </div>

            <div class="detail-content-container space-y-8">
                
                <div class="flex flex-col md:flex-row gap-6 md:gap-10 items-start">
                    
                    <div class="w-40 sm:w-56 md:w-64 flex-shrink-0 mx-auto md:mx-0 shadow-2xl rounded-xl overflow-hidden border border-zinc-800/80 bg-zinc-900">
                        <img id="detailPoster" src="" alt="Poster" class="w-full h-auto object-cover">
                    </div>

                    <div class="flex-grow space-y-4 text-center md:text-left">
                        <div class="space-y-1">
                            <h2 id="detailTitle" class="text-2xl sm:text-3xl md:text-5xl font-black text-gray-100 leading-tight"></h2>
                            <p id="detailTagline" class="text-sm md:text-base italic text-zinc-400"></p>
                        </div>

                        <div class="flex flex-wrap gap-2 md:gap-3 items-center justify-center md:justify-start text-xs sm:text-sm text-zinc-300 font-medium">
                            <span id="detailBadgeType" class="bg-red-600/10 text-red-500 border border-red-500/20 px-2 py-0.5 rounded text-xs font-bold uppercase"></span>
                            <span id="detailRating" class="bg-zinc-800 border border-zinc-700 px-2 py-0.5 rounded text-xs"></span>
                            <span id="detailReleaseDate" class="text-zinc-400"></span>
                            <span id="detailRuntime" class="text-zinc-400"></span>
                        </div>

                        <div id="detailGenres" class="flex flex-wrap gap-1.5 justify-center md:justify-start">
                            <!-- riempito dinamicamente -->
                        </div>

                        <div class="space-y-2 pt-2">
                            <h3 class="text-sm font-bold uppercase tracking-wider text-zinc-400">Trama</h3>
                            <p id="detailOverview" class="text-zinc-300 text-sm md:text-base leading-relaxed"></p>
                        </div>

                        <div class="pt-4">
                            <button id="backButton" class="inline-flex items-center gap-2 px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-white font-semibold rounded-lg border border-zinc-700 transition-all text-xs sm:text-sm uppercase tracking-wide shadow-md">
                                ⬅️ Torna Indietro
                            </button>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer class="bg-gray-800 text-center p-4 text-sm w-full">
        &copy; 2026 MovieApp. All rights reserved.
    </footer>

</body>
</html>
